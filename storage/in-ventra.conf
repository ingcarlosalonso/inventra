  <VirtualHost 127.0.0.1:80>
      ServerName development.central.in-ventra.com
      ServerAlias *.in-ventra.com *.*.in-ventra.com

      DocumentRoot /var/www/html/inventra/public

      <Directory /var/www/html/inventra/public>
          Options Indexes FollowSymLinks MultiViews
          AllowOverride All
          Require all granted
      </Directory>

      ErrorLog ${APACHE_LOG_DIR}/in-ventra_error.log
      CustomLog ${APACHE_LOG_DIR}/in-ventra_access.log combined
  </VirtualHost>
